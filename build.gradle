plugins {
    id 'fabric-loom' version '1.7-SNAPSHOT'
    id 'maven-publish'
}

version = '2.0.3'
group = 'dev.inputbooster'

base {
    archivesName = 'inputbooster'
}

repositories {
    maven { name = "FabricMC"; url = "https://maven.fabricmc.net/" }
}
dependencies {
    minecraft "com.mojang:minecraft:1.21.4"
    mappings  "net.fabricmc:yarn:1.21.4+build.1:v2"
    modImplementation "net.fabricmc:fabric-loader:0.16.9"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.112.0+1.21.4"
}

processResources {
    inputs.property "version", project.version
    filteringCharset "UTF-8"
    filesMatching("fabric.mod.json") { expand "version": project.version }
}

def targetJavaVersion = 21
tasks.withType(JavaCompile).configureEach {
    options.encoding = "UTF-8"
    options.release  = targetJavaVersion
}

java {
    withSourcesJar()
}

jar {
    from("LICENSE") { rename { "${it}_${project.base.archivesName.get()}" } }
}
