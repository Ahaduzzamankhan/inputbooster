name: Build & Release (FORCED)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 💀 REMOVE WRAPPER COMPLETELY
      - name: Remove broken wrapper
        run: rm -rf gradle/wrapper

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 🔥 FORCE Gradle 9.4.1 (no wrapper)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.8'

      # 🚀 BUILD FORCEFULLY
      - name: Build
        run: gradle build --no-daemon

      # 📦 GET VERSION FROM build.gradle
      - name: Read version
        id: version
        run: |
          VERSION=$(grep "^version" build.gradle | head -1 | cut -d"'" -f2)
          echo "MOD_VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT

      # 🔍 CHECK TAG
      - name: Check tag
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.MOD_VERSION }}" | grep -q .; then
            echo "TAG_EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "TAG_EXISTS=false" >> $GITHUB_OUTPUT
          fi

      # 📝 CHANGELOG
      - name: Extract changelog
        if: steps.tag_check.outputs.TAG_EXISTS == 'false'
        run: |
          VERSION="${{ steps.version.outputs.MOD_VERSION }}"
          awk "/^## \[$VERSION\]/{flag=1;next}/^## \[/{flag=0}flag" CHANGELOG.md > release_notes.md

      # 🏷️ CREATE TAG
      - name: Create tag
        if: steps.tag_check.outputs.TAG_EXISTS == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.TAG }}" -m "Release ${{ steps.version.outputs.TAG }}"
          git push origin "${{ steps.version.outputs.TAG }}"

      # 📦 FIND JAR
      - name: Find JAR
        id: jar
        run: |
          JAR=$(find build/libs -name "*.jar" ! -name "*-sources.jar" | head -1)
          echo "JAR_PATH=$JAR" >> $GITHUB_OUTPUT

      # 🚀 RELEASE
      - name: Create Release
        if: steps.tag_check.outputs.TAG_EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "InputBooster ${{ steps.version.outputs.TAG }}"
          body_path: release_notes.md
          files: ${{ steps.jar.outputs.JAR_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
