name: Build & Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    # This ensures every 'run' step starts inside your project folder
    defaults:
      run:
        working-directory: ./InputBooster

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build with Gradle wrapper
        run: ./gradlew build

      - name: Read mod version
        id: version
        run: |
          # Finds the version line in build.gradle
          VERSION=$(grep "^version" build.gradle | head -1 | sed "s/version = '//;s/'//")
          echo "MOD_VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.MOD_VERSION }}" | grep -q .; then
            echo "TAG_EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "TAG_EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract changelog
        id: changelog
        if: steps.tag_check.outputs.TAG_EXISTS == 'false' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          VERSION="${{ steps.version.outputs.MOD_VERSION }}"
          # Look for CHANGELOG.md inside the current working directory (InputBooster/)
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "$NOTES" > /tmp/release_notes.md

      - name: Create Git tag
        if: steps.tag_check.outputs.TAG_EXISTS == 'false' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.TAG }}" -m "Release ${{ steps.version.outputs.TAG }}"
          git push origin "${{ steps.version.outputs.TAG }}"

      - name: Find built JAR
        id: jar
        run: |
          # Search specifically within the build/libs folder of the project
          JAR=$(find build/libs -name "inputbooster-*.jar" ! -name "*-sources.jar" | head -1)
          echo "JAR_PATH=InputBooster/$JAR" >> $GITHUB_OUTPUT
          echo "Found JAR: $JAR"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.TAG_EXISTS == 'false' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "InputBooster ${{ steps.version.outputs.TAG }}"
          body_path: /tmp/release_notes.md
          files: ${{ steps.jar.outputs.JAR_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
